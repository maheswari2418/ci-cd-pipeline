version: "3.8"

services:
  react-app:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_IMAGE:-myuser/react-cicd-app}:${TAG:-latest}
    container_name: react-cicd-app
    ports:
      - "${APP_PORT:-3000}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - NODE_ENV=production

  # Optional: Uncomment to add Nginx reverse proxy with SSL
  # nginx-proxy:
